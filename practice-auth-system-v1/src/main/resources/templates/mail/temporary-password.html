<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="color-scheme" content="light" />
<meta name="supported-color-schemes" content="light" />
<title>임시 비밀번호 안내 - 옷장을 부탁해</title>
<style>
  body, table, td { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  body { margin: 0; padding: 0; width: 100% !important; background-color: #EDEFEA; }
  @media screen and (max-width: 480px) {
    .email-wrap { width: 100% !important; }
    .email-pad { padding-left: 22px !important; padding-right: 22px !important; }
    .tag-password { font-size: 24px !important; letter-spacing: 3px !important; }
  }
</style>
</head>
<body style="margin: 0; padding: 0; background-color: #EDEFEA; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', dotum, 돋움, sans-serif;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%; border-collapse: collapse; background-color: #EDEFEA;">
  <tr>
    <td align="center" style="padding: 44px 16px;">

      <table role="presentation" class="email-wrap" width="560" cellpadding="0" cellspacing="0" border="0"
             style="width: 560px; max-width: 560px; border-collapse: separate; background-color: #FFFFFF; border-radius: 14px; overflow: hidden; box-shadow: 0 12px 30px rgba(33, 38, 31, 0.08);">

        <!-- 상단 컬러 바 (원단 가장자리 스티치) -->
        <tr>
          <td style="height: 6px; line-height: 6px; font-size: 0; background-color: #2F6F5E;">&nbsp;</td>
        </tr>

        <!-- 워드마크 -->
        <tr>
          <td class="email-pad" align="left" style="padding: 36px 40px 0 40px;">
            <span style="font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #2F6F5E; text-transform: uppercase;">옷장을 부탁해</span>
          </td>
        </tr>
        <tr>
          <td class="email-pad" align="left" style="padding: 8px 40px 24px 40px;">
            <h1 style="margin: 0; font-size: 22px; line-height: 1.4; color: #21261F; font-weight: 700;">임시 비밀번호가 발급되었어요</h1>
          </td>
        </tr>

        <!-- 점선 구분선 (박음질) -->
        <tr>
          <td class="email-pad" style="padding: 0 40px;">
            <div style="border-top: 1px dashed #D8DCD3; font-size: 0; line-height: 0;">&nbsp;</div>
          </td>
        </tr>

        <!-- 본문 -->
        <tr>
          <td class="email-pad" align="left" style="padding: 28px 40px 8px 40px;">
            <p style="margin: 0; font-size: 15px; line-height: 1.7; color: #52584C;">
              안녕하세요.<br>
              요청하신 임시 비밀번호를 아래 라벨에 담아 보내드립니다.<br>
              이 비밀번호로 로그인해 주세요.
            </p>
          </td>
        </tr>

        <!-- 태그형 비밀번호 박스 -->
        <tr>
          <td class="email-pad" align="center" style="padding: 24px 40px 8px 40px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                   style="border-collapse: separate; width: 100%; background-color: #EAF2EF; border: 1px dashed #2F6F5E; border-radius: 10px;">
              <tr>
                <td align="center" style="padding: 22px 20px 8px 20px;">
                  <span style="font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: #2F6F5E; text-transform: uppercase;">Temporary Password</span>
                </td>
              </tr>
              <tr>
                <td align="center" class="tag-password" style="padding: 4px 20px 22px 20px; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 28px; font-weight: 700; color: #21261F; letter-spacing: 4px;">
                  <span th:text="${temporaryPassword}">temporary1!!</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- 유효시간 배지 -->
        <tr>
          <td align="center" style="padding: 16px 40px 4px 40px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: separate;">
              <tr>
                <td align="center" style="padding: 7px 16px; background-color: #FBEAE3; border-radius: 999px;">
                  <span style="font-size: 13px; color: #B5502E; font-weight: 600;">
                    발급 후 <span th:text="${expireMinutes}" style="font-weight: 700;">3</span>분간만 유효해요
                  </span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr>
          <td class="email-pad" align="left" style="padding: 20px 40px 36px 40px;">
            <p style="margin: 0; font-size: 13px; line-height: 1.6; color: #8A8F84;">
              로그인 후에는 보안을 위해 비밀번호를 꼭 새로 설정해 주세요.
            </p>
          </td>
        </tr>

        <!-- 점선 구분선 -->
        <tr>
          <td class="email-pad" style="padding: 0 40px;">
            <div style="border-top: 1px dashed #D8DCD3; font-size: 0; line-height: 0;">&nbsp;</div>
          </td>
        </tr>

        <!-- 푸터 -->
        <tr>
          <td class="email-pad" align="left" style="padding: 22px 40px 32px 40px; background-color: #FFFFFF;">
            <p style="margin: 0; font-size: 12px; line-height: 1.6; color: #A3A79C;">
              본 메일은 발신 전용이며 회신되지 않습니다.<br>
              요청하지 않은 메일이라면 무시하셔도 안전합니다.
            </p>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>

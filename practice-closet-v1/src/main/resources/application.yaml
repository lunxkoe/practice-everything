spring:
  application:
    name: practice-closet-v1

  datasource:
    url: jdbc:h2:tcp://localhost/~/study_db;MODE=MySQL;DB_CLOSE_DELAY=-1 # jdbc:h2:~/study_db, ~/study_db.mv.db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

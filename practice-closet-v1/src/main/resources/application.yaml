spring:
  application:
    name: practice-closet-v1

  datasource:
#    url: jdbc:h2:tcp://localhost/~/study_db;MODE=MySQL;DB_CLOSE_DELAY=-1 # jdbc:h2:~/study_db, ~/study_db.mv.db
    url: jdbc:mysql://localhost:3306/study_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: user
    password: pass
#    driver-class-name: org.h2.Driver
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost # Redis가 설치된 서버의 IP 주소 (로컬은 localhost)
      port: 6379      # Redis의 기본 포트 번호

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

